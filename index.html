<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mpickard Mylist</title>
<style>
* {
  box-sizing: border-box;
}

:root {
  --bg: #f4f4f4;
  --panel: #ffffff;
  --text: #222;
  --muted: #808080;
  --line: rgba(0,0,0,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #f7f7f7 0%, #eeeeee 100%);
  color: var(--text);
  overflow-x: hidden;
}

header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.header-left,
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.site-title {
  margin: 0;
  font-size: 24px;
  letter-spacing: 0.2px;
}

.site-title span {
  color: #8ccaff;
}

.plus-button,
.back-button,
.action-button {
  border: none;
  cursor: pointer;
  transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
}

.plus-button:hover,
.back-button:hover,
.action-button:hover {
  transform: translateY(-1px);
  opacity: 0.96;
}

.plus-button:active,
.back-button:active,
.action-button:active {
  transform: scale(0.97);
}

.plus-button {
  width: 54px;
  height: 54px;
  border-radius: 999px;
  background: #1f1f1f;
  color: white;
  font-size: 30px;
  box-shadow: 0 12px 24px rgba(0,0,0,0.16);
}

.back-button {
  padding: 10px 14px;
  border-radius: 999px;
  background: #1f1f1f;
  color: #fff;
  font-size: 14px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

.hidden {
  display: none !important;
}

.create-panel {
  background: rgba(255,255,255,0.96);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 24px;
  animation: panelIn 0.25s ease;
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.panel-title {
  margin: 0 0 12px;
  font-size: 18px;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.input-row input {
  flex: 1;
  min-width: 0;
  padding: 14px 15px;
  border: 1px solid #dddddd;
  border-radius: 14px;
  font-size: 16px;
  outline: none;
}

.input-row input:focus {
  border-color: #9fd3ff;
  box-shadow: 0 0 0 4px rgba(159,211,255,0.18);
}

.action-button {
  border-radius: 14px;
  background: #1f1f1f;
  color: white;
  padding: 14px 18px;
  font-size: 15px;
  white-space: nowrap;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}

.section-title {
  margin: 0;
  font-size: 18px;
}

.section-sub {
  color: var(--muted);
  font-size: 14px;
}

.empty-state {
  background: rgba(255,255,255,0.86);
  border: 2px dashed rgba(0,0,0,0.08);
  border-radius: 28px;
  padding: 48px 20px;
  text-align: center;
  color: #777;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
}

.empty-state strong {
  display: block;
  margin-bottom: 8px;
  color: #444;
  font-size: 17px;
}

.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 28px 24px;
}

.folder-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.folder-button {
  width: 100%;
  max-width: 220px;
  aspect-ratio: 1 / 1;
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  transition: transform 0.18s ease;
}

.folder-button:hover {
  transform: translateY(-3px) scale(1.02);
}

.folder-button:active {
  transform: scale(0.98);
}

.folder-shape {
  position: relative;
  width: 100%;
  height: 100%;
}

.folder-shape::before {
  content: "";
  position: absolute;
  left: 13%;
  top: 26%;
  width: 64%;
  height: 16%;
  border: 12px solid #000;
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  background: transparent;
}

.folder-shape::after {
  content: "";
  position: absolute;
  left: 13%;
  top: 35%;
  width: 67%;
  height: 38%;
  border: 12px solid #000;
  border-radius: 0 24px 24px 24px;
  background: transparent;
}

.folder-name {
  width: 100%;
  max-width: 220px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  line-height: 1.35;
  word-break: break-word;
}

.folder-item.newly-created .folder-button {
  animation: folderPop 0.5s cubic-bezier(.2,1.2,.2,1);
}

@keyframes folderPop {
  0% {
    opacity: 0;
    transform: scale(0.4) translateY(20px);
    filter: blur(6px);
  }
  65% {
    opacity: 1;
    transform: scale(1.08) translateY(-4px);
    filter: blur(0);
  }
  100% {
    transform: scale(1) translateY(0);
  }
}

.binder-view {
  animation: detailFade 0.24s ease;
}

@keyframes detailFade {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.binder-stage {
  max-width: 760px;
  margin: 0 auto;
}

.binder-shell {
  background: linear-gradient(145deg, #d9d9d9, #f7f7f7);
  border-radius: 32px;
  padding: 0;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.55),
    0 14px 30px rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex;
  min-height: 720px;
}

.binder-spine {
  width: 52px;
  background: linear-gradient(180deg, #cfcfcf 0%, #d8d8d8 100%);
  position: relative;
  flex-shrink: 0;
}

.binder-rings {
  position: absolute;
  top: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.ring {
  width: 10px;
  height: 42px;
  border: 3px solid #9c9c9c;
  border-radius: 999px;
  background: rgba(255,255,255,0.55);
}

.binder-main {
  flex: 1;
  padding: 28px 28px 24px;
}

.binder-pill {
  width: 100%;
  height: 54px;
  border-radius: 999px;
  background: rgba(255,255,255,0.68);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
  margin-bottom: 26px;
}

.binder-detail-name {
  margin: 0 0 22px;
  font-size: 28px;
  font-weight: 800;
  line-height: 1.3;
  word-break: break-word;
}

.album-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.album-pocket {
  position: relative;
  border: none;
  background: rgba(255,255,255,0.3);
  border-radius: 16px;
  padding: 0;
  overflow: hidden;
  aspect-ratio: 3 / 4;
  cursor: pointer;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.05),
    inset 0 0 0 2px rgba(255,255,255,0.25);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.album-pocket:hover {
  transform: translateY(-2px);
}

.album-pocket:active {
  transform: scale(0.98);
}

.album-pocket.empty {
  background: rgba(255,255,255,0.32);
}

.album-pocket.empty::before {
  content: none;
}

.album-pocket.empty::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 28px;
  height: 2px;
  border-radius: 999px;
  background: #8f8f8f;
  transform: translate(-50%, -50%);
}

.album-pocket.empty .plus-v {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 2px;
  height: 28px;
  border-radius: 999px;
  background: #8f8f8f;
  transform: translate(-50%, -50%);
}

.album-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.binder-count {
  margin-top: 16px;
  font-size: 18px;
  font-weight: 700;
}

.zoom-clone {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  transform-origin: center center;
  animation: zoomToBinder 0.62s cubic-bezier(.2,.82,.18,1) forwards;
}

@keyframes zoomToBinder {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
    filter: blur(0);
  }
  100% {
    opacity: 0;
    transform: translate(var(--tx), var(--ty)) scale(3.2);
    filter: blur(10px);
  }
}

.fade-out {
  animation: fadeOutQuick 0.22s ease forwards;
}

@keyframes fadeOutQuick {
  from { opacity: 1; }
  to { opacity: 0.06; }
}

@media (max-width: 700px) {
  .header-inner {
    padding: 14px 16px;
  }

  .container {
    padding: 20px 16px 34px;
  }

  .site-title {
    font-size: 22px;
  }

  .input-row {
    flex-direction: column;
  }

  .input-row input,
  .action-button {
    width: 100%;
  }

  .folder-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px 16px;
  }

  .folder-name {
    font-size: 18px;
  }

  .binder-shell {
    min-height: auto;
  }

  .binder-spine {
    width: 40px;
  }

  .binder-rings {
    top: 34px;
    gap: 30px;
  }

  .ring {
    width: 8px;
    height: 32px;
  }

  .binder-main {
    padding: 18px 18px 18px;
  }

  .binder-pill {
    height: 42px;
    margin-bottom: 18px;
  }

  .binder-detail-name {
    font-size: 22px;
    margin-bottom: 16px;
  }

  .album-grid {
    gap: 10px;
  }

  .album-pocket.empty::after {
    width: 24px;
    height: 2px;
  }

  .album-pocket.empty .plus-v {
    width: 2px;
    height: 24px;
  }

  .binder-count {
    font-size: 16px;
  }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <button class="back-button hidden" id="backButton" type="button">← 戻る</button>
      <h1 class="site-title">Mpickard <span>Mylist</span></h1>
    </div>
    <div class="header-right">
      <button class="plus-button" id="toggleCreateButton" type="button" aria-label="バインダー作成">＋</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="create-panel hidden" id="createPanel">
    <h2 class="panel-title">新しいバインダーを作成</h2>
    <div class="input-row">
      <input type="text" id="binderNameInput" placeholder="バインダー名を入力">
      <button class="action-button" id="createBinderButton" type="button">作成</button>
    </div>
  </div>

  <section id="binderListView">
    <div class="section-head">
      <h2 class="section-title">Binder List</h2>
      <div class="section-sub" id="binderCountText">0 binders</div>
    </div>

    <div id="emptyState" class="empty-state">
      <strong>まだバインダーがありません</strong>
      上の ＋ ボタンから作成できます
    </div>

    <div id="folderGrid" class="folder-grid"></div>
  </section>

  <section id="binderDetailView" class="binder-view hidden">
    <div class="binder-stage">
      <div class="binder-shell">
        <div class="binder-spine">
          <div class="binder-rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
          </div>
        </div>

        <div class="binder-main">
          <div class="binder-pill"></div>
          <h2 id="binderDetailName" class="binder-detail-name"></h2>
          <div id="albumGrid" class="album-grid"></div>
          <div id="binderCount" class="binder-count">0 / 16</div>
        </div>
      </div>
    </div>
  </section>
</div>

<input type="file" id="imagePicker" accept="image/*" hidden>

<script>
const STORAGE_KEY = "mpickard_binders_v4";

let binders = [];
let currentBinderId = null;
let pendingPocketIndex = null;
let lastCreatedId = null;

const toggleCreateButton = document.getElementById("toggleCreateButton");
const createPanel = document.getElementById("createPanel");
const binderNameInput = document.getElementById("binderNameInput");
const createBinderButton = document.getElementById("createBinderButton");
const folderGrid = document.getElementById("folderGrid");
const emptyState = document.getElementById("emptyState");
const binderCountText = document.getElementById("binderCountText");
const binderListView = document.getElementById("binderListView");
const binderDetailView = document.getElementById("binderDetailView");
const binderDetailName = document.getElementById("binderDetailName");
const binderCount = document.getElementById("binderCount");
const albumGrid = document.getElementById("albumGrid");
const backButton = document.getElementById("backButton");
const imagePicker = document.getElementById("imagePicker");

function loadBinders() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    binders = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(binders)) binders = [];
  } catch (error) {
    console.error(error);
    binders = [];
  }
}

function saveBinders() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(binders));
    return true;
  } catch (error) {
    alert("画像サイズが大きすぎて保存できませんでした。もう少し小さい画像で試してください。");
    console.error(error);
    return false;
  }
}

function resizeImage(file, maxSize = 900, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();

      img.onload = function() {
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > maxSize) {
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          }
        } else {
          if (height > maxSize) {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
        }

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        if (!ctx) {
          reject(new Error("Canvas context error"));
          return;
        }

        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve(dataUrl);
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

toggleCreateButton.addEventListener("click", () => {
  const willOpen = createPanel.classList.contains("hidden");
  createPanel.classList.toggle("hidden");

  if (willOpen) {
    setTimeout(() => binderNameInput.focus(), 30);
  }
});

binderNameInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") createBinder();
});

createBinderButton.addEventListener("click", createBinder);
backButton.addEventListener("click", goBackToList);

imagePicker.addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file || currentBinderId === null || pendingPocketIndex === null) return;

  const binder = binders.find(item => item.id === currentBinderId);
  if (!binder) return;

  try {
    const resizedImage = await resizeImage(file, 900, 0.82);
    binder.cards[pendingPocketIndex] = resizedImage;

    const saved = saveBinders();
    if (saved) {
      renderBinderDetail(currentBinderId);
      renderFolderList();
    } else {
      binder.cards[pendingPocketIndex] = "";
    }
  } catch (error) {
    console.error(error);
    alert("画像の読み込みに失敗しました。");
  }

  pendingPocketIndex = null;
  imagePicker.value = "";
});

function createBinder() {
  const name = binderNameInput.value.trim();

  if (!name) {
    alert("バインダー名を入力してください");
    binderNameInput.focus();
    return;
  }

  const newBinder = {
    id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()),
    name,
    cards: Array(16).fill("")
  };

  binders.unshift(newBinder);
  lastCreatedId = newBinder.id;

  const saved = saveBinders();
  if (!saved) {
    binders.shift();
    lastCreatedId = null;
    return;
  }

  renderFolderList();

  binderNameInput.value = "";
  createPanel.classList.add("hidden");
}

function renderFolderList() {
  folderGrid.innerHTML = "";
  binderCountText.textContent = `${binders.length} binders`;
  emptyState.style.display = binders.length === 0 ? "block" : "none";

  binders.forEach((binder) => {
    const item = document.createElement("div");
    item.className = "folder-item";
    if (binder.id === lastCreatedId) {
      item.classList.add("newly-created");
    }

    item.innerHTML = `
      <button class="folder-button" type="button" data-id="${binder.id}">
        <div class="folder-shape"></div>
      </button>
      <div class="folder-name">${escapeHtml(binder.name)}</div>
    `;

    const button = item.querySelector(".folder-button");
    button.addEventListener("click", () => openBinderWithZoom(button, binder.id));

    folderGrid.appendChild(item);
  });

  if (lastCreatedId) {
    const created = document.querySelector(".folder-item.newly-created");
    if (created) {
      created.addEventListener("animationend", () => {
        created.classList.remove("newly-created");
      }, { once: true });
    }
    lastCreatedId = null;
  }
}

function openBinderWithZoom(button, binderId) {
  const rect = button.getBoundingClientRect();
  const clone = button.cloneNode(true);
  clone.className = "zoom-clone";
  clone.style.left = `${rect.left}px`;
  clone.style.top = `${rect.top}px`;
  clone.style.width = `${rect.width}px`;
  clone.style.height = `${rect.height}px`;

  const targetX = window.innerWidth / 2 - (rect.left + rect.width / 2);
  const targetY = window.innerHeight / 2 - (rect.top + rect.height / 2);
  clone.style.setProperty("--tx", `${targetX}px`);
  clone.style.setProperty("--ty", `${targetY}px`);

  document.body.appendChild(clone);
  binderListView.classList.add("fade-out");

  setTimeout(() => {
    currentBinderId = binderId;
    createPanel.classList.add("hidden");
    binderListView.classList.add("hidden");
    binderListView.classList.remove("fade-out");
    binderDetailView.classList.remove("hidden");
    backButton.classList.remove("hidden");
    toggleCreateButton.classList.add("hidden");
    renderBinderDetail(binderId);
  }, 260);

  clone.addEventListener("animationend", () => {
    clone.remove();
  }, { once: true });
}

function renderBinderDetail(binderId) {
  const binder = binders.find(item => item.id === binderId);
  if (!binder) return;

  binderDetailName.textContent = binder.name;
  albumGrid.innerHTML = "";

  for (let i = 0; i < 16; i++) {
    const pocket = document.createElement("button");
    pocket.type = "button";
    pocket.className = "album-pocket";
    pocket.dataset.index = i;

    if (binder.cards[i]) {
      const img = document.createElement("img");
      img.src = binder.cards[i];
      img.alt = "";
      img.className = "album-image";
      pocket.appendChild(img);
    } else {
      pocket.classList.add("empty");
      const plusV = document.createElement("div");
      plusV.className = "plus-v";
      pocket.appendChild(plusV);
    }

    pocket.addEventListener("click", () => selectPocket(i));
    albumGrid.appendChild(pocket);
  }

  const filled = binder.cards.filter(Boolean).length;
  binderCount.textContent = `${filled} / 16`;
}

function selectPocket(index) {
  pendingPocketIndex = index;
  imagePicker.click();
}

function goBackToList() {
  currentBinderId = null;
  pendingPocketIndex = null;
  binderDetailView.classList.add("hidden");
  binderListView.classList.remove("hidden");
  backButton.classList.add("hidden");
  toggleCreateButton.classList.remove("hidden");
  renderFolderList();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

loadBinders();
renderFolderList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mpickard Mylist</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: #efefef;
  color: #222;
}

header {
  background: #222;
  color: #fff;
  padding: 18px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: 0.5px;
}

header h1 span {
  color: #8fd3ff;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

.form-area {
  background: #fff;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 24px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

.upload-box {
  width: 100%;
  height: 220px;
  background: #e3e3e3;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}

.upload-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: #777;
  pointer-events: none;
}

.upload-icon {
  width: 90px;
  height: 120px;
  border-radius: 18px;
  background: #9f9f9f;
  position: relative;
}

.upload-icon::before,
.upload-icon::after {
  content: "";
  position: absolute;
  background: #fff;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 3px;
}

.upload-icon::before {
  width: 42px;
  height: 8px;
}

.upload-icon::after {
  width: 8px;
  height: 42px;
}

.upload-label {
  font-size: 14px;
  font-weight: 600;
}

.preview-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

input[type="text"] {
  width: 100%;
  padding: 12px;
  border: 1px solid #d6d6d6;
  border-radius: 10px;
  font-size: 16px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.92;
}

.album-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin: 0 0 12px;
}

.album-title {
  font-size: 18px;
  font-weight: 700;
  margin: 0;
}

.page-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

.page-controls button {
  width: auto;
  min-width: 88px;
  padding: 10px 14px;
  border-radius: 999px;
}

.page-indicator {
  font-size: 14px;
  color: #555;
  min-width: 72px;
  text-align: center;
}

.book-stage {
  perspective: 2000px;
}

.album-page-wrap {
  position: relative;
  min-height: 1190px;
}

.album-page {
  background: linear-gradient(145deg, #d9d9d9, #f7f7f7);
  border-radius: 28px;
  padding: 22px;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.55),
    0 8px 20px rgba(0,0,0,0.08);
  backface-visibility: hidden;
  transform-origin: left center;
}

.card-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.pocket {
  background: rgba(255,255,255,0.55);
  border-radius: 18px;
  padding: 10px;
  min-height: 220px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.9),
    inset 0 0 18px rgba(255,255,255,0.3);
}

.card {
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}

.card-name {
  padding: 10px 8px 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  background: #fff;
}

.empty-pocket {
  width: 100%;
  height: 100%;
  min-height: 200px;
  border: 2px dashed rgba(120,120,120,0.35);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #8a8a8a;
  font-size: 14px;
  text-align: center;
  background: rgba(255,255,255,0.35);
}

/* めくり用の一時ページ */
.flip-page {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  background: linear-gradient(145deg, #d9d9d9, #f7f7f7);
  border-radius: 28px;
  padding: 22px;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.55),
    0 8px 20px rgba(0,0,0,0.08);
  transform-origin: left center;
  backface-visibility: hidden;
}

.flip-page.next {
  animation: flipNext 0.8s ease-in-out forwards;
}

.flip-page.prev {
  transform-origin: right center;
  animation: flipPrev 0.8s ease-in-out forwards;
}

@keyframes flipNext {
  0% {
    transform: rotateY(0deg);
    opacity: 1;
    filter: brightness(1);
  }
  50% {
    filter: brightness(0.92);
  }
  100% {
    transform: rotateY(-160deg);
    opacity: 0.15;
    filter: brightness(0.75);
  }
}

@keyframes flipPrev {
  0% {
    transform: rotateY(0deg);
    opacity: 1;
    filter: brightness(1);
  }
  50% {
    filter: brightness(0.92);
  }
  100% {
    transform: rotateY(160deg);
    opacity: 0.15;
    filter: brightness(0.75);
  }
}

@media (max-width: 900px) {
  .card-list {
    grid-template-columns: repeat(3, 1fr);
  }

  .album-page-wrap {
    min-height: auto;
  }
}

@media (max-width: 640px) {
  .album-head {
    flex-direction: column;
    align-items: stretch;
  }

  .page-controls {
    justify-content: center;
  }

  .card-list {
    grid-template-columns: repeat(2, 1fr);
  }

  .pocket {
    min-height: 200px;
  }

  .card img {
    height: 160px;
  }

  .album-page-wrap {
    min-height: auto;
  }
}
</style>
</head>
<body>

<header>
  <h1>Mpickard <span>Mylist</span></h1>
</header>

<div class="container">

  <div class="form-area">
    <div class="upload-box" id="uploadBox">
      <img id="previewImage" class="preview-image" alt="プレビュー">
      <div id="uploadPlaceholder" class="upload-placeholder">
        <div class="upload-icon"></div>
        <div class="upload-label">カード</div>
      </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" hidden>
    <input type="text" id="nameInput" placeholder="カード名">
    <button type="button" onclick="addCard()">追加</button>
  </div>

  <div class="album-head">
    <p class="album-title">Binder Page</p>
    <div class="page-controls">
      <button type="button" onclick="goPrevPage()">前へ</button>
      <div class="page-indicator" id="pageIndicator">1 / 1</div>
      <button type="button" onclick="goNextPage()">次へ</button>
    </div>
  </div>

  <div class="book-stage">
    <div class="album-page-wrap" id="albumPageWrap">
      <div class="album-page" id="albumPage">
        <div id="cardList" class="card-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
let cards = JSON.parse(localStorage.getItem("cards") || "[]");
let currentPage = 0;
const pageSize = 20;
let isFlipping = false;

const imageInput = document.getElementById("imageInput");
const uploadBox = document.getElementById("uploadBox");
const previewImage = document.getElementById("previewImage");
const uploadPlaceholder = document.getElementById("uploadPlaceholder");
const nameInput = document.getElementById("nameInput");
const cardList = document.getElementById("cardList");
const pageIndicator = document.getElementById("pageIndicator");
const albumPageWrap = document.getElementById("albumPageWrap");
const albumPage = document.getElementById("albumPage");

uploadBox.addEventListener("click", () => {
  imageInput.click();
});

function save() {
  localStorage.setItem("cards", JSON.stringify(cards));
}

function getTotalPages() {
  return Math.max(1, Math.ceil(cards.length / pageSize));
}

function resetPreview() {
  previewImage.src = "";
  previewImage.style.display = "none";
  uploadPlaceholder.style.display = "flex";
}

imageInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    previewImage.src = e.target.result;
    previewImage.style.display = "block";
    uploadPlaceholder.style.display = "none";
  };
  reader.readAsDataURL(file);
});

function addCard() {
  const file = imageInput.files[0];
  const name = nameInput.value.trim();

  if (!file || !name) {
    alert("画像と名前を入力してください");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    cards.push({
      name: name,
      image: e.target.result
    });

    save();

    currentPage = getTotalPages() - 1;
    renderCurrentPage();

    imageInput.value = "";
    nameInput.value = "";
    resetPreview();
  };
  reader.readAsDataURL(file);
}

function createPocketHTML(card) {
  if (card) {
    return `
      <div class="pocket">
        <div class="card">
          <img src="${card.image}" alt="${escapeHtml(card.name)}">
          <div class="card-name">${escapeHtml(card.name)}</div>
        </div>
      </div>
    `;
  }

  return `
    <div class="pocket">
      <div class="empty-pocket">空きポケット</div>
    </div>
  `;
}

function renderPageToHTML(pageIndex) {
  const start = pageIndex * pageSize;
  const pageCards = cards.slice(start, start + pageSize);

  let html = "";
  for (let i = 0; i < pageSize; i++) {
    html += createPocketHTML(pageCards[i]);
  }
  return html;
}

function renderCurrentPage() {
  const totalPages = getTotalPages();
  if (currentPage > totalPages - 1) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;

  cardList.innerHTML = renderPageToHTML(currentPage);
  pageIndicator.textContent = `${currentPage + 1} / ${totalPages}`;
}

function animateFlip(direction, nextPageIndex) {
  if (isFlipping) return;
  isFlipping = true;

  const flipPage = document.createElement("div");
  flipPage.className = `flip-page ${direction}`;
  flipPage.innerHTML = `<div class="card-list">${renderPageToHTML(currentPage)}</div>`;
  albumPageWrap.appendChild(flipPage);

  currentPage = nextPageIndex;
  renderCurrentPage();

  flipPage.addEventListener("animationend", () => {
    flipPage.remove();
    isFlipping = false;
  }, { once: true });
}

function goNextPage() {
  const totalPages = getTotalPages();
  if (currentPage >= totalPages - 1 || isFlipping) return;
  animateFlip("next", currentPage + 1);
}

function goPrevPage() {
  if (currentPage <= 0 || isFlipping) return;
  animateFlip("prev", currentPage - 1);
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

resetPreview();
renderCurrentPage();
</script>

</body>
</html>

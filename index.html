<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mpickard Mylist</title>
<style>
* {
  box-sizing: border-box;
}

:root {
  --bg: #f3f3f3;
  --panel: #ffffff;
  --text: #222;
  --muted: #777;
  --accent: #222;
  --shadow: 0 10px 24px rgba(0,0,0,0.08);
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #f7f7f7 0%, #eeeeee 100%);
  color: var(--text);
}

header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-title {
  margin: 0;
  font-size: 24px;
  letter-spacing: 0.3px;
}

.site-title span {
  color: #7fc7ff;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.plus-button {
  width: 52px;
  height: 52px;
  border: none;
  border-radius: 999px;
  background: #222;
  color: white;
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.18);
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}

.plus-button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 12px 26px rgba(0,0,0,0.2);
}

.plus-button:active {
  transform: scale(0.96);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 22px 20px 40px;
}

.create-panel {
  background: rgba(255,255,255,0.95);
  border-radius: 22px;
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 22px;
  transform-origin: top right;
  animation: panelIn 0.28s ease;
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.create-panel.hidden {
  display: none;
}

.panel-title {
  margin: 0 0 12px;
  font-size: 18px;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.input-row input {
  flex: 1;
  min-width: 0;
  padding: 13px 14px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
}

.input-row input:focus {
  border-color: #8dcfff;
  box-shadow: 0 0 0 4px rgba(141,207,255,0.16);
}

.action-button {
  border: none;
  border-radius: 12px;
  background: #222;
  color: white;
  padding: 13px 18px;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.16s ease, opacity 0.16s ease;
  white-space: nowrap;
}

.action-button:hover {
  transform: translateY(-1px);
  opacity: 0.96;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 8px 0 14px;
}

.section-title {
  margin: 0;
  font-size: 18px;
}

.section-sub {
  color: var(--muted);
  font-size: 14px;
}

.empty-state {
  background: rgba(255,255,255,0.82);
  border: 2px dashed rgba(0,0,0,0.1);
  border-radius: 24px;
  padding: 44px 20px;
  text-align: center;
  color: #777;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
}

.empty-state strong {
  display: block;
  margin-bottom: 8px;
  color: #444;
  font-size: 17px;
}

.binder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}

.binder-card {
  position: relative;
  border-radius: 24px;
  padding: 18px;
  min-height: 250px;
  background:
    linear-gradient(135deg, #fafafa 0%, #ececec 100%);
  box-shadow:
    0 14px 30px rgba(0,0,0,0.08),
    inset 0 0 0 1px rgba(255,255,255,0.7);
  overflow: hidden;
  transform-origin: center bottom;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.binder-card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 20px 38px rgba(0,0,0,0.1),
    inset 0 0 0 1px rgba(255,255,255,0.78);
}

.binder-card.newly-created {
  animation: binderPop 0.58s cubic-bezier(.2,1.2,.2,1);
}

@keyframes binderPop {
  0% {
    opacity: 0;
    transform: scale(0.25) translateY(30px);
    filter: blur(6px);
  }
  55% {
    opacity: 1;
    transform: scale(1.08) translateY(-6px);
    filter: blur(0);
  }
  75% {
    transform: scale(0.96) translateY(2px);
  }
  100% {
    transform: scale(1) translateY(0);
  }
}

.binder-spine {
  position: absolute;
  left: 0;
  top: 0;
  width: 24px;
  height: 100%;
  background: linear-gradient(180deg, #dcdcdc 0%, #cfcfcf 100%);
  box-shadow: inset -3px 0 8px rgba(0,0,0,0.08);
}

.binder-rings {
  position: absolute;
  left: 8px;
  top: 22px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.ring {
  width: 8px;
  height: 22px;
  border: 2px solid #9c9c9c;
  border-radius: 999px;
  background: rgba(255,255,255,0.55);
}

.binder-cover {
  margin-left: 20px;
  height: 100%;
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(255,255,255,0.8), rgba(240,240,240,0.9));
  padding: 18px 16px 16px;
  position: relative;
}

.binder-label {
  display: inline-block;
  padding: 7px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.9);
  font-size: 12px;
  color: #666;
  margin-bottom: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.binder-name {
  margin: 0 0 14px;
  font-size: 20px;
  line-height: 1.35;
  word-break: break-word;
}

.pocket-preview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: auto;
}

.mini-pocket {
  aspect-ratio: 3 / 4;
  border-radius: 6px;
  background: rgba(255,255,255,0.62);
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
}

.binder-meta {
  margin-top: 14px;
  font-size: 13px;
  color: #777;
}

@media (max-width: 640px) {
  .header-inner {
    padding: 14px 16px;
  }

  .container {
    padding: 18px 16px 34px;
  }

  .site-title {
    font-size: 22px;
  }

  .input-row {
    flex-direction: column;
  }

  .input-row input,
  .action-button {
    width: 100%;
  }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="site-title">Mpickard <span>Mylist</span></h1>
    <div class="top-actions">
      <button class="plus-button" id="toggleCreateButton" aria-label="バインダー作成">＋</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="create-panel hidden" id="createPanel">
    <h2 class="panel-title">新しいバインダーを作成</h2>
    <div class="input-row">
      <input type="text" id="binderNameInput" placeholder="バインダー名を入力">
      <button class="action-button" type="button" id="createBinderButton">作成</button>
    </div>
  </div>

  <div class="section-head">
    <h2 class="section-title">Binder List</h2>
    <div class="section-sub" id="binderCountText">0 binders</div>
  </div>

  <div id="emptyState" class="empty-state">
    <strong>まだバインダーがありません</strong>
    上の ＋ ボタンから最初のバインダーを作成できます
  </div>

  <div id="binderGrid" class="binder-grid"></div>
</div>

<script>
const STORAGE_KEY = "mpickard_binders_v1";

let binders = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let lastCreatedId = null;

const toggleCreateButton = document.getElementById("toggleCreateButton");
const createPanel = document.getElementById("createPanel");
const binderNameInput = document.getElementById("binderNameInput");
const createBinderButton = document.getElementById("createBinderButton");
const binderGrid = document.getElementById("binderGrid");
const emptyState = document.getElementById("emptyState");
const binderCountText = document.getElementById("binderCountText");

toggleCreateButton.addEventListener("click", () => {
  const isHidden = createPanel.classList.contains("hidden");
  createPanel.classList.toggle("hidden");

  if (isHidden) {
    setTimeout(() => binderNameInput.focus(), 30);
  }
});

binderNameInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    createBinder();
  }
});

createBinderButton.addEventListener("click", createBinder);

function saveBinders() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(binders));
}

function createBinder() {
  const name = binderNameInput.value.trim();

  if (!name) {
    alert("バインダー名を入力してください");
    binderNameInput.focus();
    return;
  }

  const newBinder = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    name,
    createdAt: new Date().toISOString(),
    cards: []
  };

  binders.unshift(newBinder);
  lastCreatedId = newBinder.id;
  saveBinders();
  renderBinders();

  binderNameInput.value = "";
  createPanel.classList.add("hidden");
}

function renderBinders() {
  binderGrid.innerHTML = "";
  binderCountText.textContent = `${binders.length} binders`;
  emptyState.style.display = binders.length === 0 ? "block" : "none";

  binders.forEach((binder) => {
    const article = document.createElement("article");
    article.className = "binder-card";

    if (binder.id === lastCreatedId) {
      article.classList.add("newly-created");
    }

    article.innerHTML = `
      <div class="binder-spine"></div>
      <div class="binder-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="binder-cover">
        <div class="binder-label">BINDER</div>
        <h3 class="binder-name">${escapeHtml(binder.name)}</h3>

        <div class="pocket-preview">
          ${'<div class="mini-pocket"></div>'.repeat(20)}
        </div>

        <div class="binder-meta">4 × 5 pockets</div>
      </div>
    `;

    binderGrid.appendChild(article);
  });

  if (lastCreatedId) {
    const created = document.querySelector(".binder-card.newly-created");
    if (created) {
      created.addEventListener("animationend", () => {
        created.classList.remove("newly-created");
      }, { once: true });
    }
    lastCreatedId = null;
  }
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

renderBinders();
</script>
</body>
</html>
